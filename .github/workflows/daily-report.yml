name: Daily Security Report

on:
  schedule:
    # 每天 UTC 23:00 = 台灣時間隔天早上 07:00
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate incident report
        run: npm run generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate yuqing (buzz) report
        run: npm run generate:yuqing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate threat intel digest
        run: npm run generate:threat-intel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/yuqing.html docs/threat-intel.html
          git diff --staged --quiet || git commit -m "Update security reports $(date -u +%Y-%m-%d)"
          git push
