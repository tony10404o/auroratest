<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資安輿情監控</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E13;--panel:#121821;--panel-alt:#1A222C;--border:#232D39;
    --text:#E8EDF2;--text-dim:#8B98A5;--text-faint:#4A5568;
    --accent:#4C8DFF;--accent-dim:#2A5CAF;
    --pos:#34D399;--pos-bg:rgba(52,211,153,0.12);
    --neg:#FF4D5E;--neg-bg:rgba(255,77,94,0.12);
    --neu:#8B98A5;--neu-bg:rgba(139,152,165,0.12);
    --mixed:#FFB020;--mixed-bg:rgba(255,176,32,0.12);
    --buzz-high:#FF6B4A;--buzz-mid:#FFB020;--buzz-low:#4C8DFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse 900px 500px at 15% -10%, rgba(76,141,255,0.08), transparent), var(--bg);
    color:var(--text);font-family:'IBM Plex Sans TC','Noto Sans TC',sans-serif;
    min-height:100vh;padding:28px 20px 60px;
  }
  .wrap{max-width:980px;margin:0 auto;}
  .header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;padding-bottom:18px;margin-bottom:6px;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#2A5CAF);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.3px;}
  .brand .sub{font-size:11.5px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:2px;}
  .nav{display:flex;gap:14px;font-family:'JetBrains Mono',monospace;font-size:12px;}
  .nav a{color:var(--text-dim);text-decoration:none;padding:5px 0;border-bottom:2px solid transparent;}
  .nav a.active{color:var(--text);border-color:var(--accent);}
  .nav a:hover{color:var(--text);}
  .disclaimer{
    font-size:11.5px;color:var(--text-dim);background:var(--panel);border:1px solid var(--border);
    border-radius:7px;padding:10px 14px;margin:16px 0 20px;line-height:1.6;
  }
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:22px;}
  input[type=text], select{background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Sans TC',sans-serif;font-size:13px;padding:9px 12px;border-radius:7px;outline:none;}
  input[type=text]{flex:1;min-width:180px;}
  input[type=text]:focus, select:focus{border-color:var(--accent-dim);}
  select{font-family:'JetBrains Mono',monospace;cursor:pointer;}
  .meta-line{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-dim);margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap;}
  .meta-line b{color:var(--text);}
  .list{display:flex;flex-direction:column;gap:10px;}
  .card{background:var(--panel);border:1px solid var(--border);border-left-width:4px;border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:9px;animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .card.buzz-高{border-left-color:var(--buzz-high);}
  .card.buzz-中{border-left-color:var(--buzz-mid);}
  .card.buzz-低{border-left-color:var(--buzz-low);}
  .card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .card-title{font-size:14.5px;font-weight:600;line-height:1.4;}
  .buzz-meter{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);white-space:nowrap;flex-shrink:0;padding-top:2px;}
  .buzz-bars{display:flex;gap:2px;}
  .buzz-bars span{width:4px;height:12px;border-radius:2px;background:var(--border);}
  .card.buzz-高 .buzz-bars span{background:var(--buzz-high);}
  .card.buzz-中 .buzz-bars span:nth-child(-n+2){background:var(--buzz-mid);}
  .card.buzz-低 .buzz-bars span:nth-child(1){background:var(--buzz-low);}
  .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text-dim);}
  .tag.sent-正面{color:var(--pos);background:var(--pos-bg);border-color:transparent;}
  .tag.sent-負面{color:var(--neg);background:var(--neg-bg);border-color:transparent;}
  .tag.sent-中立{color:var(--neu);background:var(--neu-bg);border-color:transparent;}
  .tag.sent-兩極{color:var(--mixed);background:var(--mixed-bg);border-color:transparent;}
  .card-summary{font-size:13px;color:var(--text-dim);line-height:1.6;}
  .card-sources{display:flex;gap:10px;flex-wrap:wrap;margin-top:2px;}
  .card-link{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent);text-decoration:none;white-space:nowrap;}
  .card-link:hover{text-decoration:underline;}
  .state{text-align:center;padding:60px 20px;color:var(--text-dim);}
  .state .big{font-size:32px;margin-bottom:10px;}
  .footer-note{text-align:center;font-size:11px;color:var(--text-faint);margin-top:30px;font-family:'JetBrains Mono',monospace;}
  @media (max-width:600px){.header{flex-direction:column;align-items:flex-start;}.toolbar{flex-direction:column;align-items:stretch;}select{width:100%;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="brand">
      <div class="brand-icon">📡</div>
      <div><h1>資安輿情監控</h1><div class="sub">GLOBAL SECURITY BUZZ TRACKER</div></div>
    </div>
    <div class="nav">
      <a href="index.html">事件監控台</a>
      <a href="yuqing.html" class="active">輿情監控</a>
    </div>
  </div>

  <div class="disclaimer">
    ⚠️ 聲量與情緒為 AI 根據公開搜尋結果（新聞＋PTT/Dcard/X等公開頁面）做的質化判斷，非平台官方統計數字，僅供參考趨勢方向，不代表精確聲量數據。
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜尋議題關鍵字...">
    <select id="sentimentFilter">
      <option value="">所有情緒傾向</option>
      <option value="正面">正面</option>
      <option value="中立">中立</option>
      <option value="負面">負面</option>
      <option value="兩極">兩極/爭議</option>
    </select>
    <select id="buzzFilter">
      <option value="">所有聲量</option>
      <option value="高">高聲量</option>
      <option value="中">中聲量</option>
      <option value="低">低聲量</option>
    </select>
  </div>

  <div class="meta-line">共 <b id="totalCount">0</b> 個議題　·　最後更新：<b>2026-07-08 12:00:00（台灣時間，初始資料）</b></div>
  <div id="content"></div>
  <div class="footer-note">資料由 AI 每日自動搜尋整理，實際聲量請以各平台官方數據或輿情監測服務為準。</div>
</div>

<script>
const TOPICS = [
  {
    "topic": "AI Agent首例自主執行勒索軟體攻擊(JADEPUFFER)",
    "buzz_level": "高",
    "sentiment": "負面",
    "trend": "上升",
    "summary": "雲端安全業者Sysdig揭露一起完全由大型語言模型驅動的AI Agent自主發動勒索軟體攻擊案例,資安圈熱議AI自主攻擊的可行性與防禦難度。",
    "sources": [
      {
        "name": "TechNews科技新報",
        "url": "https://infosecu.technews.tw/"
      }
    ]
  },
  {
    "topic": "Pegasus間諜軟體再爆爭議,調查者自身遭監控",
    "buzz_level": "中",
    "sentiment": "負面",
    "trend": "持平",
    "summary": "一名負責調查Pegasus濫用情況的歐洲政治人物,被證實自己的手機也遭同款間諜軟體入侵,網路上對政府濫用監控工具的疑慮再度升溫。",
    "sources": [
      {
        "name": "TechNews科技新報",
        "url": "https://infosecu.technews.tw/"
      }
    ]
  },
  {
    "topic": "Google聯合FBI打擊全球最大惡意代理網路NetNut",
    "buzz_level": "中",
    "sentiment": "正面",
    "trend": "上升",
    "summary": "Google威脅情報團隊與FBI、Lumen等單位聯手,大規模清除數百萬台遭感染裝置組成的惡意住宅代理網路,資安社群普遍正面看待此次執法行動。",
    "sources": [
      {
        "name": "TechNews科技新報",
        "url": "https://infosecu.technews.tw/"
      }
    ]
  },
  {
    "topic": "2026年AI詐騙浪潮成主流話題",
    "buzz_level": "高",
    "sentiment": "負面",
    "trend": "上升",
    "summary": "趨勢科技發布年度預測指出AI詐騙已成全球主流手法,討論焦點集中在詐騙手法將更快速、更客製化,一般民眾與企業普遍表達擔憂。",
    "sources": [
      {
        "name": "趨勢科技",
        "url": "https://www.trendmicro.com/zh_tw/security-intelligence/threat-report.html"
      }
    ]
  },
  {
    "topic": "歐盟CRA網路韌性法案合規壓力延燒",
    "buzz_level": "中",
    "sentiment": "兩極",
    "trend": "持平",
    "summary": "隨歐盟《網路韌性法案》上路時程逼近,產業界討論如何因應SBOM、供應鏈安全等新規要求,部分認同必要性、部分則反映合規成本與時程壓力大。",
    "sources": [
      {
        "name": "經濟日報",
        "url": "https://money.udn.com/money/story/5612/9484657"
      }
    ]
  },
  {
    "topic": "台灣政府強調國家級資安韌性與跨機關聯防",
    "buzz_level": "中",
    "sentiment": "中立",
    "trend": "持平",
    "summary": "數位發展部與資安署召開資安長共識營,強調台灣每天面對逾260萬次網路攻擊,討論聚焦於代理式AI風險與跨機關資安聯防機制的強化。",
    "sources": [
      {
        "name": "聯合新聞網",
        "url": "https://udn.com/news/story/7240/9486277"
      }
    ]
  },
  {
    "topic": "後量子加密(PQC)遷移期限逼近引發討論",
    "buzz_level": "中",
    "sentiment": "中立",
    "trend": "上升",
    "summary": "美方行政命令明定2030年為後量子加密遷移最後期限,資安社群開始討論企業因應時程、技術門檻與轉換成本等實務挑戰。",
    "sources": [
      {
        "name": "iThome",
        "url": "https://cybersecurenews.com.tw/industry-talk-101/"
      }
    ]
  }
];

const contentEl = document.getElementById('content');
const totalCount = document.getElementById('totalCount');
const searchInput = document.getElementById('searchInput');
const sentimentFilter = document.getElementById('sentimentFilter');
const buzzFilter = document.getElementById('buzzFilter');

function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

function renderState(icon, text){
  contentEl.innerHTML = `<div class="state"><div class="big">${icon}</div><p>${text}</p></div>`;
}

function buzzBars(level){
  const n = level === '高' ? 3 : level === '中' ? 2 : 1;
  let bars = '';
  for (let i=0;i<3;i++) bars += `<span style="${i<n?'':'opacity:.35'}"></span>`;
  return `<div class="buzz-bars">${bars}</div>`;
}

function renderCards(items){
  if (!items.length){ renderState('🔍', '沒有符合篩選條件的議題。'); return; }
  const buzzRank = {'高':0,'中':1,'低':2};
  const sorted = [...items].sort((a,b) => (buzzRank[a.buzz_level] ?? 3) - (buzzRank[b.buzz_level] ?? 3));

  contentEl.innerHTML = `<div class="list">${sorted.map(item => `
    <div class="card buzz-${escapeHtml(item.buzz_level || '')}">
      <div class="card-top">
        <div class="card-title">${escapeHtml(item.topic)}</div>
        <div class="buzz-meter">${buzzBars(item.buzz_level)}<span>${escapeHtml(item.buzz_level || '')}聲量</span></div>
      </div>
      <div class="tags">
        ${item.sentiment ? `<span class="tag sent-${escapeHtml(item.sentiment)}">情緒：${escapeHtml(item.sentiment)}</span>` : ''}
        ${item.trend ? `<span class="tag">趨勢：${escapeHtml(item.trend)}</span>` : ''}
      </div>
      ${item.summary ? `<div class="card-summary">${escapeHtml(item.summary)}</div>` : ''}
      ${item.sources && item.sources.length ? `<div class="card-sources">${item.sources.map(s => `<a class="card-link" href="${escapeHtml(s.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(s.name)} ↗</a>`).join('')}</div>` : ''}
    </div>`).join('')}</div>`;
}

function applyFilters(){
  const q = searchInput.value.trim().toLowerCase();
  const sent = sentimentFilter.value;
  const buzz = buzzFilter.value;
  const filtered = TOPICS.filter(item => {
    if (sent && item.sentiment !== sent) return false;
    if (buzz && item.buzz_level !== buzz) return false;
    if (q){
      const hay = [item.topic, item.summary].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  renderCards(filtered);
}

totalCount.textContent = TOPICS.length;
applyFilters();
searchInput.addEventListener('input', applyFilters);
sentimentFilter.addEventListener('change', applyFilters);
buzzFilter.addEventListener('change', applyFilters);
</script>
</body>
</html>
