  .card.sev-中{border-left-color:var(--sev-medium);}
  .card.sev-低{border-left-color:var(--sev-low);}
  .card.plain{border-left-color:var(--accent);}

  .card-title{font-size:13.5px;font-weight:600;line-height:1.4;}
  .card-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);white-space:nowrap;flex-shrink:0;padding-top:1px;}

  .tag.kpi{color:var(--accent);background:rgba(37,99,235,0.08);border-color:transparent;}
  .card-summary{font-size:12.5px;color:var(--text-dim);line-height:1.6;}
  .card-bottom{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .card-link{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);text-decoration:none;white-space:nowrap;}

  .empty-note{color:var(--text-faint);font-size:12px;padding:10px 0;font-family:'JetBrains Mono',monospace;}

</head>

      "source_url": "https://thehackernews.com/"
    }
  ],
  "ransomware_apt": [
    {
      "date": "2026-06-01",
      "type": "勒索軟體",
      "title": "World Leaks攻擊Tata Electronics，逾20萬份檔案外洩",
      "summary": "勒索軟體組織World Leaks聲稱入侵Tata Electronics並公開大量內部檔案。",
      "source_name": "綜合報導",
      "source_url": "https://www.brightdefense.com/resources/recent-data-breaches/",
      "is_awareness_case": false
    },
    {
      "date": "2026-06-23",
      "type": "勒索軟體",
      "title": "KDDI郵件系統遭入侵，逾1,422萬組帳密可能外洩",
      "summary": "日本電信業者KDDI代管的郵件系統遭入侵，攻擊者利用第三方軟體漏洞取得帳密資料。",
      "source_name": "綜合報導",
      "source_url": "https://www.brightdefense.com/resources/recent-data-breaches/",
      "is_awareness_case": false
    },
    {
      "date": "2026-05-29",
      "type": "APT",
      "title": "駭客組織UAT-8616鎖定Cisco Catalyst SD-WAN",
      "summary": "疑似國家級駭客組織針對Cisco SD-WAN設備發動鎖定式攻擊，利用目錄穿越等漏洞滲透。",
      "source_name": "TWCERT/CC",
      "source_url": "https://www.twcert.org.tw/tw/mp-1.html",
      "is_awareness_case": false
    }
  ]
};
const UPDATED_AT = "2026-07-13 12:00:00（台灣時間）";

function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

document.getElementById('badgeDate').textContent = UPDATED_AT;

function renderAiSummary(summary){
  const el = document.getElementById('aiSummaryText');
  if (!summary || !Array.isArray(summary) || !summary.length){
    el.textContent = '（本次無摘要資料）';
    return;
  }
  el.innerHTML = summary.map(block => `
    <div class="ai-summary-block">
      <div class="ai-summary-block-heading">${escapeHtml(block.heading || '')}</div>
      <div class="ai-summary-block-text">${escapeHtml(block.text || '')}</div>
    </div>`).join('');
}
renderAiSummary(DATA.ai_summary);

function statCard({icon, label, tone, number, unit, badgeText, desc}){
  return `<div class="stat-card ${tone ? 'tone-'+tone : ''}">
    <div class="stat-top">
      <span class="stat-label">${icon ? icon+' ' : ''}${label}</span>
      ${badgeText ? `<span class="stat-badge ${tone ? 'tone-'+tone : ''}">${badgeText}</span>` : ''}
    </div>
    <div class="stat-number">${number}${unit ? `<span>${unit}</span>` : ''}</div>
    <div class="stat-desc">${desc}</div>
  </div>`;
}

function buildStats(data){
  const kev = data.kev_vulnerabilities || [];
  const vendor = data.vendor_advisories || [];
  const news = data.international_news || [];
  const gov = data.gov_announcements || [];
  const ransomwareApt = data.ransomware_apt || [];

  const vendorHigh = vendor.filter(v => v.severity_guess === '高').length;
  const cveCount = kev.filter(v => v.cve_id && v.cve_id.trim()).length;
  const ransomwareCount = ransomwareApt.filter(r => r.type === '勒索軟體').length;
  const majorIncidents = kev.length + ransomwareApt.length;
  const awarenessCount = [...news, ...gov, ...ransomwareApt].filter(i => i.is_awareness_case).length;

  const cards = [
    statCard({
      icon:'🔴', label:'今日重大資安事件數', tone: majorIncidents > 0 ? '高' : '低',
      number: majorIncidents, unit:'件',
      badgeText: 'KEV + 勒索/APT',
      desc: '涵蓋已知遭實際利用漏洞、勒索軟體與APT活動事件。'
    }),
    statCard({
      icon:'🎯', label:'Critical／High漏洞數', tone: (kev.length + vendorHigh) > 0 ? '高' : '低',
      number: kev.length + vendorHigh, unit:'筆',
      badgeText: `KEV${kev.length}＋廠商高危${vendorHigh}`,
      desc: '建議優先確認內部是否有相關產品曝險。'
    }),
    statCard({
      icon:'🆕', label:'新增CVE數', tone:null,
      number: cveCount, unit:'筆',
      badgeText:'本期新增',
      desc: '本次彙整中出現的具名CVE編號數量。'
    }),
    statCard({
      icon:'⚠️', label:'已知遭利用漏洞（KEV）', tone: kev.length > 0 ? '高' : '低',
      number: kev.length, unit:'筆',
      badgeText:'CISA KEV',
      desc: '來自CISA官方Feed，代表已被實際利用、需優先處理。'
    }),
    statCard({
      icon:'🦠', label:'勒索病毒事件數', tone: ransomwareCount > 0 ? '高' : '低',
      number: ransomwareCount, unit:'件',
      badgeText:'全球案例',
      desc: '過去14天內公開報導的勒索軟體攻擊事件。'
    }),
    statCard({
      icon:'📢', label:'今日可宣導案例數', tone:null,
      number: awarenessCount, unit:'則',
      badgeText:'適合員工教育',
      desc: 'AI研判適合用於內部資安宣導、教育訓練的案例（如釣魚手法、詐騙趨勢等）。'
    }),
  ];

  document.getElementById('statGrid').innerHTML = cards.join('');
}

buildStats(DATA);

function section(icon, title, countLabel, bodyHtml){
  return `<div class="section">
    <div class="section-header">
      <span class="section-icon">${icon}</span>
      <span class="section-title">${title}</span>
      <span class="section-count">${countLabel}</span>
    </div>
    ${bodyHtml}
  </div>`;
}

function emptyNote(){
  return `<div class="empty-note">目前沒有資料</div>`;
}

function kevKpiTags(v){
  const tags = ['📊今日重大事件', '🎯Critical/High漏洞', '⚠️KEV'];
  if (v.cve_id && v.cve_id.trim()) tags.push('🆕新增CVE');
  return tags.map(t => `<span class="tag kpi">${t}</span>`).join('');
}

function renderKev(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(v => `
    <div class="card ${v.known_ransomware_use ? 'sev-高' : 'plain'}">
      <div class="card-top">
        <div class="card-title">${escapeHtml(v.cve_id || '')} － ${escapeHtml(v.title || '')}</div>
        <div class="card-date">${escapeHtml(v.date_added || '')}</div>
      </div>
      <div class="tags">
        <span class="tag">${escapeHtml(v.vendor_product || '')}</span>
        ${v.known_ransomware_use ? `<span class="tag ransomware">⚠ 已知遭勒索軟體利用</span>` : ''}
        ${kevKpiTags(v)}
      </div>
      ${v.summary ? `<div class="card-summary">${escapeHtml(v.summary)}</div>` : ''}
    </div>`).join('')}</div>`;
}

function renderVendorAdvisories(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(v => `
    <div class="card sev-${escapeHtml(v.severity_guess || '')}">
      <div class="card-top">
        <div class="card-title">${escapeHtml(v.title || '')}</div>
      </div>
      <div class="tags">
        <span class="tag">${escapeHtml(v.vendor || '')}</span>
        ${v.severity_guess ? `<span class="tag sev-${escapeHtml(v.severity_guess)}">研判嚴重度：${escapeHtml(v.severity_guess)}</span>` : ''}
        ${v.severity_guess === '高' ? `<span class="tag kpi">🎯Critical/High漏洞</span>` : ''}
      </div>
      ${v.url ? `<div class="card-bottom"><span></span><a class="card-link" href="${escapeHtml(v.url)}" target="_blank" rel="noopener noreferrer">查看公告 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

function renderNews(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(n => `
    <div class="card plain">
      <div class="card-top"><div class="card-title">${escapeHtml(n.title || '')}</div></div>
      <div class="tags">
        <span class="tag">${escapeHtml(n.source || '')}</span>
        ${n.is_awareness_case ? `<span class="tag kpi">📢可宣導案例</span>` : ''}
      </div>
      ${n.summary ? `<div class="card-summary">${escapeHtml(n.summary)}</div>` : ''}
      ${n.url ? `<div class="card-bottom"><span></span><a class="card-link" href="${escapeHtml(n.url)}" target="_blank" rel="noopener noreferrer">閱讀原文 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

function renderGov(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(g => `
    <div class="card plain">
      <div class="card-top">
        <div class="card-title">${escapeHtml(g.title || '')}</div>
        <div class="card-date">${escapeHtml(g.date || '')}</div>
      </div>
      <div class="tags">
        <span class="tag">${escapeHtml(g.source || '')}</span>
        ${g.is_awareness_case ? `<span class="tag kpi">📢可宣導案例</span>` : ''}
      </div>
      ${g.summary ? `<div class="card-summary">${escapeHtml(g.summary)}</div>` : ''}
      ${g.url ? `<div class="card-bottom"><span></span><a class="card-link" href="${escapeHtml(g.url)}" target="_blank" rel="noopener noreferrer">查看公告 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

function renderIoc(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(i => `
    <div class="card plain">
      <div class="card-top"><div class="card-title">${escapeHtml(i.campaign || '')}</div></div>
      <div class="tags">${(i.ioc_types || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
      ${i.summary ? `<div class="card-summary">${escapeHtml(i.summary)}</div>` : ''}
      ${i.source_url ? `<div class="card-bottom"><span style="font-size:11px;color:var(--text-faint);">${escapeHtml(i.source_name || '')}</span><a class="card-link" href="${escapeHtml(i.source_url)}" target="_blank" rel="noopener noreferrer">來源 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

function renderRansomwareApt(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(r => `
    <div class="card ${r.type === '勒索軟體' ? 'sev-高' : 'plain'}">
      <div class="card-top">
        <div class="card-title">${escapeHtml(r.title || '')}</div>
        <div class="card-date">${escapeHtml(r.date || '')}</div>
      </div>
      <div class="tags">
        <span class="tag ${r.type === '勒索軟體' ? 'ransomware' : ''}">${escapeHtml(r.type || '')}</span>
        <span class="tag kpi">📊今日重大事件</span>
        ${r.type === '勒索軟體' ? `<span class="tag kpi">🦠勒索病毒事件</span>` : ''}
        ${r.is_awareness_case ? `<span class="tag kpi">📢可宣導案例</span>` : ''}
      </div>
      ${r.summary ? `<div class="card-summary">${escapeHtml(r.summary)}</div>` : ''}
      ${r.source_url ? `<div class="card-bottom"><span style="font-size:11px;color:var(--text-faint);">${escapeHtml(r.source_name || '')}</span><a class="card-link" href="${escapeHtml(r.source_url)}" target="_blank" rel="noopener noreferrer">來源 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

document.getElementById('fullWidthSection').innerHTML =
  section('🎯', 'CISA KEV 已知遭實際利用漏洞', (DATA.kev_vulnerabilities||[]).length + ' 筆', renderKev(DATA.kev_vulnerabilities));

const leftHtml = [
  section('🇹🇼', '國內 CERT 與政府資安公告', (DATA.gov_announcements||[]).length + ' 則', renderGov(DATA.gov_announcements)),
  section('🏢', '廠商安全公告（Microsoft／Cisco／Fortinet）', (DATA.vendor_advisories||[]).length + ' 則', renderVendorAdvisories(DATA.vendor_advisories)),
].join('');

const rightHtml = [
  section('🌐', '國際資安新聞', (DATA.international_news||[]).length + ' 則', renderNews(DATA.international_news)),
  section('🔬', 'IOC 情資重點', (DATA.ioc_highlights||[]).length + ' 則', renderIoc(DATA.ioc_highlights)),
  section('🕵️', '勒索軟體與 APT 活動', (DATA.ransomware_apt||[]).length + ' 則', renderRansomwareApt(DATA.ransomware_apt)),
].join('');

document.getElementById('contentColLeft').innerHTML = leftHtml;
document.getElementById('contentColRight').innerHTML = rightHtml;
</script>
</body>
