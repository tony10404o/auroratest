<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>威脅情資彙整</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;--panel:#F8FAFC;--panel-alt:#F1F5F9;--border:#E2E8F0;
    --text:#1E293B;--text-dim:#64748B;--text-faint:#94A3B8;
    --accent:#2563EB;--accent-dim:#1D4ED8;
    --sev-high:#DC2626;--sev-high-bg:rgba(220,38,38,0.08);
    --sev-medium:#D97706;--sev-medium-bg:rgba(217,119,6,0.08);
    --sev-low:#059669;--sev-low-bg:rgba(5,150,105,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse 900px 500px at 15% -10%, rgba(37,99,235,0.04), transparent), var(--bg);
    color:var(--text);font-family:'IBM Plex Sans TC','Noto Sans TC',sans-serif;
    min-height:100vh;padding:28px 20px 60px;
  }
  .wrap{max-width:1100px;margin:0 auto;}
  .header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;padding-bottom:18px;margin-bottom:6px;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#2A5CAF);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.3px;}
  .brand .sub{font-size:11.5px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:2px;}
  .nav{display:flex;gap:14px;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:14px;}
  .nav a{color:var(--text-dim);text-decoration:none;padding:5px 0;border-bottom:2px solid transparent;}
  .nav a.active{color:var(--text);border-bottom-color:var(--accent);}
  .nav a:hover{color:var(--text);}
  .meta-line{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-dim);margin:10px 0 24px;}
  .meta-line b{color:var(--text);}

  .section{margin-bottom:20px;width:100%;}
  .content-columns{display:flex;gap:20px;align-items:flex-start;}
  .content-col{flex:1;min-width:0;}
  @media (max-width:900px){.content-columns{flex-direction:column;}}
  .full-width-section{margin-bottom:20px;}
  .section-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .section-icon{font-size:15px;}
  .section-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;}
  .section-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);background:var(--panel);border:1px solid var(--border);padding:2px 8px;border-radius:20px;}

  .list{display:flex;flex-direction:column;gap:8px;}
  .card{background:var(--panel);border:1px solid var(--border);border-left-width:4px;border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .card.sev-高{border-left-color:var(--sev-high);}
  .card.sev-中{border-left-color:var(--sev-medium);}
  .card.sev-低{border-left-color:var(--sev-low);}
  .card.plain{border-left-color:var(--accent);}
  .card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .card-title{font-size:13.5px;font-weight:600;line-height:1.4;}
  .card-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);white-space:nowrap;flex-shrink:0;padding-top:1px;}
  .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--border);color:var(--text-dim);}
  .tag.sev-高{color:var(--sev-high);background:var(--sev-high-bg);border-color:transparent;}
  .tag.sev-中{color:var(--sev-medium);background:var(--sev-medium-bg);border-color:transparent;}
  .tag.sev-低{color:var(--sev-low);background:var(--sev-low-bg);border-color:transparent;}
  .tag.ransomware{color:var(--sev-high);background:var(--sev-high-bg);border-color:transparent;font-weight:600;}
  .tag.kpi{color:var(--accent);background:rgba(37,99,235,0.08);border-color:transparent;}
  .card-summary{font-size:12.5px;color:var(--text-dim);line-height:1.6;}
  .card-bottom{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .card-link{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);text-decoration:none;white-space:nowrap;}
  .card-link:hover{text-decoration:underline;}
  .empty-note{color:var(--text-faint);font-size:12px;padding:10px 0;font-family:'JetBrains Mono',monospace;}

  /* Executive header badges */
  .exec-tagline{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent);letter-spacing:0.5px;margin:2px 0 10px;}
  .badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
  .badge{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    padding:7px 12px;display:flex;flex-direction:column;gap:1px;
  }
  .badge .badge-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.5px;}
  .badge .badge-value{font-size:12.5px;font-weight:600;color:var(--text);}

  /* Stat cards */
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:30px;}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 16px 14px;border-top:3px solid var(--accent);}
  .stat-card.tone-高{border-top-color:var(--sev-high);}
  .stat-card.tone-中{border-top-color:var(--sev-medium);}
  .stat-card.tone-低{border-top-color:var(--sev-low);}
  .stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .stat-label{font-size:12px;font-weight:600;color:var(--text-dim);}
  .stat-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--panel-alt);color:var(--text-dim);white-space:nowrap;}
  .stat-badge.tone-高{color:var(--sev-high);background:var(--sev-high-bg);}
  .stat-badge.tone-中{color:var(--sev-medium);background:var(--sev-medium-bg);}
  .stat-badge.tone-低{color:var(--sev-low);background:var(--sev-low-bg);}
  .stat-number{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:var(--text);line-height:1;margin-bottom:8px;}
  .stat-number span{font-size:14px;color:var(--text-dim);font-weight:500;margin-left:2px;}
  .stat-desc{font-size:11.5px;color:var(--text-dim);line-height:1.6;}
  @media (max-width:800px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:480px){.stat-grid{grid-template-columns:1fr;}}

  .ai-summary{
    background:linear-gradient(135deg, rgba(37,99,235,0.05), rgba(37,99,235,0.01));
    border:1px solid var(--border);border-left:4px solid var(--accent);
    border-radius:10px;padding:16px 18px;margin-bottom:26px;
  }
  .ai-summary-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .ai-summary-icon{font-size:15px;}
  .ai-summary-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;}
  .ai-summary-badge{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--accent);background:rgba(37,99,235,0.1);padding:2px 8px;border-radius:20px;}
  .ai-summary-text{font-size:13.5px;line-height:1.8;color:var(--text);}
  .ai-summary-blocks{display:flex;flex-direction:column;gap:12px;}
  .ai-summary-block{padding-top:10px;border-top:1px dashed var(--border);}
  .ai-summary-block:first-child{padding-top:0;border-top:none;}
  .ai-summary-block-heading{font-size:12.5px;font-weight:700;color:var(--accent);margin-bottom:4px;}
  .ai-summary-block-text{font-size:13.5px;line-height:1.8;color:var(--text);}

  .footer-note{text-align:center;font-size:11px;color:var(--text-faint);margin-top:30px;font-family:'JetBrains Mono',monospace;}
  @media (max-width:600px){.header{flex-direction:column;align-items:flex-start;}}
</style>
</head>

function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

function renderAiSummary(summary){
  const el = document.getElementById('aiSummaryText');
  if (!summary || !Array.isArray(summary) || !summary.length){
    el.textContent = '（本次無摘要資料）';
    return;
  }
  el.innerHTML = summary.map(block => `
    <div class="ai-summary-block">
      <div class="ai-summary-block-heading">${escapeHtml(block.heading || '')}</div>
      <div class="ai-summary-block-text">${escapeHtml(block.text || '')}</div>
    </div>`).join('');
}

function statCard({icon, label, tone, number, unit, badgeText, desc}){
  return `<div class="stat-card ${tone ? 'tone-'+tone : ''}">

    <div class="stat-number">${number}${unit ? `<span>${unit}</span>` : ''}</div>
    <div class="stat-desc">${desc}</div>
  </div>`;
}

function buildStats(data){
  const kev = data.kev_vulnerabilities || [];
  const vendor = data.vendor_advisories || [];
  const news = data.international_news || [];
  const gov = data.gov_announcements || [];
  const ransomwareApt = data.ransomware_apt || [];

  const vendorHigh = vendor.filter(v => v.severity_guess === '高').length;
  const cveCount = kev.filter(v => v.cve_id && v.cve_id.trim()).length;
  const ransomwareCount = ransomwareApt.filter(r => r.type === '勒索軟體').length;
  const majorIncidents = kev.length + ransomwareApt.length;
  const awarenessCount = [...news, ...gov, ...ransomwareApt].filter(i => i.is_awareness_case).length;

  const cards = [
    statCard({
      icon:'🔴', label:'今日重大資安事件數', tone: majorIncidents > 0 ? '高' : '低',
      number: majorIncidents, unit:'件',
      badgeText: 'KEV + 勒索/APT',
      desc: '涵蓋已知遭實際利用漏洞、勒索軟體與APT活動事件。'
    }),
    statCard({
      icon:'🎯', label:'Critical／High漏洞數', tone: (kev.length + vendorHigh) > 0 ? '高' : '低',
      number: kev.length + vendorHigh, unit:'筆',
      badgeText: `KEV${kev.length}＋廠商高危${vendorHigh}`,
      desc: '建議優先確認內部是否有相關產品曝險。'
    }),
    statCard({
      icon:'🆕', label:'新增CVE數', tone:null,
      number: cveCount, unit:'筆',
      badgeText:'本期新增',
      desc: '本次彙整中出現的具名CVE編號數量。'
    }),
    statCard({
      icon:'⚠️', label:'已知遭利用漏洞（KEV）', tone: kev.length > 0 ? '高' : '低',
      number: kev.length, unit:'筆',
      badgeText:'CISA KEV',
      desc: '來自CISA官方Feed，代表已被實際利用、需優先處理。'
    }),
    statCard({
      icon:'🦠', label:'勒索病毒事件數', tone: ransomwareCount > 0 ? '高' : '低',
      number: ransomwareCount, unit:'件',
      badgeText:'全球案例',
      desc: '過去14天內公開報導的勒索軟體攻擊事件。'
    }),
    statCard({
      icon:'📢', label:'今日可宣導案例數', tone:null,
      number: awarenessCount, unit:'則',
      badgeText:'適合員工教育',
      desc: 'AI研判適合用於內部資安宣導、教育訓練的案例（如釣魚手法、詐騙趨勢等）。'
    }),
  ];

  document.getElementById('statGrid').innerHTML = cards.join('');
}

buildStats(DATA);

function section(icon, title, countLabel, bodyHtml){
  return `<div class="section">
    <div class="section-header">
      <span class="section-icon">${icon}</span>
      <span class="section-title">${title}</span>
      <span class="section-count">${countLabel}</span>
    </div>
    ${bodyHtml}
  </div>`;
}

function emptyNote(){
  return `<div class="empty-note">目前沒有資料</div>`;
}

function kevKpiTags(v){
  const tags = ['📊今日重大事件', '🎯Critical/High漏洞', '⚠️KEV'];
  if (v.cve_id && v.cve_id.trim()) tags.push('🆕新增CVE');
  return tags.map(t => `<span class="tag kpi">${t}</span>`).join('');
}

function renderKev(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(v => `
    <div class="card ${v.known_ransomware_use ? 'sev-高' : 'plain'}">
      <div class="card-top">
        <div class="card-title">${escapeHtml(v.cve_id || '')} － ${escapeHtml(v.title || '')}</div>
        <div class="card-date">${escapeHtml(v.date_added || '')}</div>
      </div>
      <div class="tags">
        <span class="tag">${escapeHtml(v.vendor_product || '')}</span>
        ${v.known_ransomware_use ? `<span class="tag ransomware">⚠ 已知遭勒索軟體利用</span>` : ''}
        ${kevKpiTags(v)}
      </div>
      ${v.summary ? `<div class="card-summary">${escapeHtml(v.summary)}</div>` : ''}
    </div>`).join('')}</div>`;
}

function renderVendorAdvisories(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(v => `
    <div class="card sev-${escapeHtml(v.severity_guess || '')}">
      <div class="card-top">
        <div class="card-title">${escapeHtml(v.title || '')}</div>
      </div>
      <div class="tags">
        <span class="tag">${escapeHtml(v.vendor || '')}</span>
        ${v.severity_guess ? `<span class="tag sev-${escapeHtml(v.severity_guess)}">研判嚴重度：${escapeHtml(v.severity_guess)}</span>` : ''}
        ${v.severity_guess === '高' ? `<span class="tag kpi">🎯Critical/High漏洞</span>` : ''}
      </div>
      ${v.url ? `<div class="card-bottom"><span></span><a class="card-link" href="${escapeHtml(v.url)}" target="_blank" rel="noopener noreferrer">查看公告 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

function renderNews(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(n => `
    <div class="card plain">
      <div class="card-top"><div class="card-title">${escapeHtml(n.title || '')}</div></div>
      <div class="tags">
        <span class="tag">${escapeHtml(n.source || '')}</span>
        ${n.is_awareness_case ? `<span class="tag kpi">📢可宣導案例</span>` : ''}
      </div>
      ${n.summary ? `<div class="card-summary">${escapeHtml(n.summary)}</div>` : ''}
      ${n.url ? `<div class="card-bottom"><span></span><a class="card-link" href="${escapeHtml(n.url)}" target="_blank" rel="noopener noreferrer">閱讀原文 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

function renderGov(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(g => `
    <div class="card plain">
      <div class="card-top">
        <div class="card-title">${escapeHtml(g.title || '')}</div>
        <div class="card-date">${escapeHtml(g.date || '')}</div>
      </div>
      <div class="tags">
        <span class="tag">${escapeHtml(g.source || '')}</span>
        ${g.is_awareness_case ? `<span class="tag kpi">📢可宣導案例</span>` : ''}
      </div>
      ${g.summary ? `<div class="card-summary">${escapeHtml(g.summary)}</div>` : ''}
      ${g.url ? `<div class="card-bottom"><span></span><a class="card-link" href="${escapeHtml(g.url)}" target="_blank" rel="noopener noreferrer">查看公告 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

function renderIoc(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(i => `
    <div class="card plain">
      <div class="card-top"><div class="card-title">${escapeHtml(i.campaign || '')}</div></div>
      <div class="tags">${(i.ioc_types || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
      ${i.summary ? `<div class="card-summary">${escapeHtml(i.summary)}</div>` : ''}
      ${i.source_url ? `<div class="card-bottom"><span style="font-size:11px;color:var(--text-faint);">${escapeHtml(i.source_name || '')}</span><a class="card-link" href="${escapeHtml(i.source_url)}" target="_blank" rel="noopener noreferrer">來源 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

function renderRansomwareApt(items){
  if (!items || !items.length) return emptyNote();
  return `<div class="list">${items.map(r => `
    <div class="card ${r.type === '勒索軟體' ? 'sev-高' : 'plain'}">
      <div class="card-top">
        <div class="card-title">${escapeHtml(r.title || '')}</div>
        <div class="card-date">${escapeHtml(r.date || '')}</div>
      </div>
      <div class="tags">
        <span class="tag ${r.type === '勒索軟體' ? 'ransomware' : ''}">${escapeHtml(r.type || '')}</span>
        <span class="tag kpi">📊今日重大事件</span>
        ${r.type === '勒索軟體' ? `<span class="tag kpi">🦠勒索病毒事件</span>` : ''}
        ${r.is_awareness_case ? `<span class="tag kpi">📢可宣導案例</span>` : ''}
      </div>
      ${r.summary ? `<div class="card-summary">${escapeHtml(r.summary)}</div>` : ''}
      ${r.source_url ? `<div class="card-bottom"><span style="font-size:11px;color:var(--text-faint);">${escapeHtml(r.source_name || '')}</span><a class="card-link" href="${escapeHtml(r.source_url)}" target="_blank" rel="noopener noreferrer">來源 ↗</a></div>` : ''}
    </div>`).join('')}</div>`;
}

const leftHtml = [
  section('🇹🇼', '國內 CERT 與政府資安公告', (DATA.gov_announcements||[]).length + ' 則', renderGov(DATA.gov_announcements)),
  section('🎯', 'CISA KEV 已知遭實際利用漏洞', (DATA.kev_vulnerabilities||[]).length + ' 筆', renderKev(DATA.kev_vulnerabilities)),
].join('');

const middleHtml = [
  section('🏢', '廠商安全公告（Microsoft／Cisco／Fortinet）', (DATA.vendor_advisories||[]).length + ' 則', renderVendorAdvisories(DATA.vendor_advisories)),
  section('🌐', '國際資安新聞', (DATA.international_news||[]).length + ' 則', renderNews(DATA.international_news)),
].join('');

const rightHtml = [
  section('🔬', 'IOC 情資重點', (DATA.ioc_highlights||[]).length + ' 則', renderIoc(DATA.ioc_highlights)),
  section('🕵️', '勒索軟體與 APT 活動', (DATA.ransomware_apt||[]).length + ' 則', renderRansomwareApt(DATA.ransomware_apt)),
].join('');

document.getElementById('contentColLeft').innerHTML = leftHtml;
document.getElementById('contentColMiddle').innerHTML = middleHtml;
document.getElementById('contentColRight').innerHTML = rightHtml;
</script>
</body>
</html>
