<style>
  :root{
    --bg:#FFFFFF;--panel:#F8FAFC;--panel-alt:#F1F5F9;--border:#E2E8F0;
    --text:#1E293B;--text-dim:#64748B;--text-faint:#94A3B8;
    --accent:#2563EB;--accent-dim:#1D4ED8;
    --sev-high:#DC2626;--sev-high-bg:rgba(220,38,38,0.08);
    --sev-medium:#D97706;--sev-medium-bg:rgba(217,119,6,0.08);
    --sev-low:#059669;--sev-low-bg:rgba(5,150,105,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse 900px 500px at 15% -10%, rgba(37,99,235,0.04), transparent), var(--bg);
    color:var(--text);font-family:'IBM Plex Sans TC','Noto Sans TC',sans-serif;
    min-height:100vh;padding:24px 20px 60px;
  }
  .wrap{max-width:1300px;margin:0 auto;}

  /* header */
  .header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;padding-bottom:16px;margin-bottom:4px;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#2A5CAF);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;letter-spacing:0.3px;}
  .brand .sub{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-top:1px;}
  .meta-line{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}

  .dashboard-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:18px;}
  @media (max-width:1000px){.dashboard-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
  @media (max-width:640px){.dashboard-grid{grid-template-columns:1fr;}}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;min-width:0;}
  .panel-header{display:flex;align-items:center;gap:6px;margin-bottom:12px;}
  .panel-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);}
  .panel-icon{font-size:14px;}
  .panel-title{font-weight:700;font-size:13.5px;color:var(--text);}
  .panel-viewall{margin-left:auto;font-size:11px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .panel-viewall:hover{text-decoration:underline;}
  .panel-body{flex:1;}
  .empty-note{color:var(--text-faint);font-size:12px;padding:10px 0;font-family:'JetBrains Mono',monospace;}

  /* impact / tags */
  .impact-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
  .impact-高{color:var(--sev-high);background:var(--sev-high-bg);}
  .impact-中{color:var(--sev-medium);background:var(--sev-medium-bg);}
  .impact-低{color:var(--sev-low);background:var(--sev-low-bg);}
  .stars{font-size:10.5px;color:#F59E0B;letter-spacing:1px;white-space:nowrap;}

  /* panel 1: 頭條 */
  .headline-row{display:flex;gap:10px;padding:9px 0;border-top:1px dashed var(--border);}
  .headline-row:first-child{border-top:none;padding-top:0;}
  .headline-num{width:18px;height:18px;border-radius:50%;background:var(--panel-alt);color:var(--text-dim);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace;margin-top:1px;}
  .headline-body{flex:1;min-width:0;}
  .headline-title{font-size:12.5px;font-weight:600;line-height:1.4;margin-bottom:3px;overflow-wrap:anywhere;}
  .headline-title a{color:var(--text);text-decoration:none;}
  .headline-title a:hover{color:var(--accent);}
  .headline-sub{font-size:10.5px;color:var(--text-dim);margin-bottom:4px;}
  .headline-meta{display:flex;justify-content:space-between;align-items:center;gap:6px;}

  /* panel 2: 全球重大事件 */
  .tab-row{display:flex;gap:6px;margin-bottom:10px;}
  .tab-btn{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;}
  .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .event-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-top:1px dashed var(--border);}
  .event-row:first-child{border-top:none;padding-top:0;}
  .event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
  .event-body{flex:1;min-width:0;}
  .event-cat{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
  .event-title{font-size:12.5px;font-weight:600;line-height:1.4;overflow-wrap:anywhere;}
  .event-title a{color:var(--text);text-decoration:none;}
  .event-title a:hover{color:var(--accent);}
  .event-time{font-size:10.5px;color:var(--text-faint);white-space:nowrap;font-family:'JetBrains Mono',monospace;margin-top:2px;}

  /* panel 3: CVE 雷達 */
  .cve-table{width:100%;border-collapse:collapse;font-size:11.5px;}
  .cve-table th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint);font-weight:600;padding:0 4px 8px;border-bottom:1px solid var(--border);}
  .cve-table td{padding:8px 4px;border-bottom:1px dashed var(--border);vertical-align:top;}
  .cve-table tr:last-child td{border-bottom:none;}
  .cve-id{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text);}
  .cve-title{font-size:10.5px;color:var(--text-dim);margin-top:2px;overflow-wrap:anywhere;}
  .cvss-num{font-family:'JetBrains Mono',monospace;font-weight:700;}
  .cvss-source{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:var(--text-faint);margin-top:1px;}
  .exploited-yes{color:var(--sev-high);font-weight:700;font-size:10.5px;}
  .exploited-no{color:var(--text-faint);font-size:10.5px;}
  .action-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;display:inline-block;}
  .action-立即更新{background:var(--sev-high);color:#fff;}
  .action-一週內更新{background:var(--sev-medium);color:#fff;}
  .action-持續觀察{background:var(--panel-alt);color:var(--text-dim);}
  .action-暫不處理{background:transparent;color:var(--text-faint);border:1px solid var(--border);}

  /* panel 4: 廠商影響 */
  .vendor-card{display:flex;gap:10px;padding:10px 0;border-top:1px dashed var(--border);}
  .vendor-card:first-child{border-top:none;padding-top:0;}
  .vendor-icon{width:30px;height:30px;border-radius:8px;background:var(--panel-alt);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .vendor-body{flex:1;min-width:0;}
  .vendor-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px;}
  .vendor-title{font-size:12.5px;font-weight:600;overflow-wrap:anywhere;}
  .vendor-asset{font-size:10.5px;color:var(--text-dim);margin-bottom:4px;}
  .vendor-asset .tag-chip{display:inline-block;background:var(--panel-alt);border-radius:5px;padding:1px 6px;margin-right:4px;font-family:'JetBrains Mono',monospace;font-size:10px;}
  .vendor-suggestion{font-size:11px;color:var(--text-dim);line-height:1.6;background:var(--panel-alt);border-radius:6px;padding:6px 8px;margin-top:4px;}
  .vendor-suggestion b{color:var(--accent);}

  /* panel 5: 風險儀表板 */
  .gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 4px;}
  .gauge-score{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;margin-top:-8px;}
  .gauge-level{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;margin-bottom:12px;}
  .risk-bars{display:flex;flex-direction:column;gap:8px;}
  .risk-bar-row{display:flex;align-items:center;gap:8px;}
  .risk-bar-label{font-size:11px;color:var(--text-dim);width:76px;flex-shrink:0;}
  .risk-bar-track{flex:1;height:6px;background:var(--panel-alt);border-radius:4px;overflow:hidden;}
  .risk-bar-fill{height:100%;border-radius:4px;}
  .risk-bar-val{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-dim);width:34px;text-align:right;flex-shrink:0;}

  /* panel 6: 每日一題 */
  .learning-card{background:linear-gradient(135deg, rgba(37,99,235,0.06), rgba(37,99,235,0.01));border:1px solid var(--border);border-radius:10px;padding:14px;}
  .learning-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .learning-icon{width:32px;height:32px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .learning-title{font-size:13.5px;font-weight:700;}
  .learning-desc{font-size:12px;color:var(--text-dim);line-height:1.7;margin-bottom:10px;}
  .learning-bottom{display:flex;justify-content:space-between;align-items:center;}
  .learning-time{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-faint);}
  .learning-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#fff;background:var(--accent);border:none;padding:7px 14px;border-radius:7px;text-decoration:none;cursor:pointer;}
  .learning-btn:hover{background:var(--accent-dim);}

  .footer-note{text-align:center;font-size:11px;color:var(--text-faint);margin-top:26px;font-family:'JetBrains Mono',monospace;}
</style>
</head>

function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
function emptyNote(){ return `<div class="empty-note">目前沒有資料</div>`; }

function panelShell(num, icon, title, viewAllUrl, bodyHtml, extraHeaderHtml=''){
  return `<div class="panel">

      <span class="panel-icon">${icon}</span>
      <span class="panel-title">${escapeHtml(title)}</span>

    </div>
    ${extraHeaderHtml}
    <div class="panel-body">${bodyHtml}</div>
  </div>`;
}

/* ---------- Panel 1: 今日資安頭條 ---------- */
function renderHeadlines(items){
  if (!items || !items.length) return emptyNote();
  return items.slice(0,5).map((h, i) => `
    <div class="headline-row">
      <div class="headline-num">${i+1}</div>
      <div class="headline-body">
        <div class="headline-title">${h.icon ? h.icon + ' ' : ''}${h.url ? `<a href="${escapeHtml(h.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(h.title)}</a>` : escapeHtml(h.title)}</div>
        ${h.subtitle ? `<div class="headline-sub">${escapeHtml(h.subtitle)}</div>` : ''}
        <div class="headline-meta">
          ${h.impact ? `<span class="impact-badge impact-${escapeHtml(h.impact)}">${escapeHtml(h.impact)}影響</span>` : '<span></span>'}
          ${h.stars ? `<span class="stars">${'★'.repeat(h.stars)}${'☆'.repeat(5-h.stars)}</span>` : ''}
        </div>
      </div>
    </div>`).join('');
}

function timeAgoLabel(dateStr){
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  const diffMs = Date.now() - d.getTime();
  const diffDays = Math.floor(diffMs / 86400000);
  if (diffDays <= 0) return '今天';
  if (diffDays === 1) return '昨天';
  return `${diffDays}天前`;
}

function renderGlobalEvents(items, rangeDays){
  const cutoff = Date.now() - rangeDays * 86400000;
  const filtered = (items || []).filter(e => {
    const d = new Date(e.date);
    return isNaN(d.getTime()) ? true : d.getTime() >= cutoff;
  });
  if (!filtered.length) return emptyNote();
  return filtered.slice(0, 8).map(e => `
    <div class="event-row">
      <div class="event-dot" style="background:${CATEGORY_COLORS[e.category] || 'var(--text-faint)'}"></div>
      <div class="event-body">
        <div class="event-cat">${escapeHtml(e.category || '')}</div>
        <div class="event-title">${e.url ? `<a href="${escapeHtml(e.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(e.title)}</a>` : escapeHtml(e.title)}</div>
      </div>
      <div class="event-time">${timeAgoLabel(e.date)}</div>
    </div>`).join('');
}

function setupGlobalEventsPanel(items){
  const body = document.getElementById('globalEventsBody');
  const tabs = document.querySelectorAll('.tab-btn');
  function render(days){
    body.innerHTML = renderGlobalEvents(items, days);
  }
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(parseInt(btn.dataset.days, 10));
    });
  });
  render(1);
}

/* ---------- Panel 3: 今日漏洞雷達 ---------- */
function renderCveRadar(items){
  if (!items || !items.length) return emptyNote();
  const rows = items.slice(0,8).map(v => `
    <tr>
      <td>
        <div class="cve-id">${escapeHtml(v.cve_id || '')}</div>
        <div class="cve-title">${escapeHtml(v.title || '')}</div>
      </td>
      <td class="cvss-num">${v.cvss ?? '—'}${v.cvss_source ? `<div class="cvss-source">${escapeHtml(v.cvss_source)}</div>` : ''}</td>
      <td>${v.exploited ? `<span class="exploited-yes">Yes</span>` : `<span class="exploited-no">No</span>`}</td>
      <td><span class="action-badge action-${escapeHtml(v.action || '持續觀察')}">${escapeHtml(v.action || '持續觀察')}</span></td>
    </tr>`).join('');
  return `<table class="cve-table">
    <thead><tr><th>漏洞編號</th><th>CVSS</th><th>已利用</th><th>建議行動</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

/* ---------- Panel 4: AI企業影響分析 ---------- */
function renderVendorImpact(items){
  if (!items || !items.length) return emptyNote();
  return items.slice(0,5).map(v => `
    <div class="vendor-card">
      <div class="vendor-icon">${v.icon || '🏢'}</div>
      <div class="vendor-body">
        <div class="vendor-top">
          <div class="vendor-title">${escapeHtml(v.title || '')}</div>
          ${v.impact ? `<span class="impact-badge impact-${escapeHtml(v.impact)}">${escapeHtml(v.impact)}</span>` : ''}
        </div>
        ${v.key_asset ? `<div class="vendor-asset"><span class="tag-chip">${escapeHtml(v.key_asset)}</span></div>` : ''}
        ${v.ai_suggestion ? `<div class="vendor-suggestion"><b>AI建議：</b>${escapeHtml(v.ai_suggestion)}</div>` : ''}
      </div>
    </div>`).join('');
}

/* ---------- Panel 5: AI風險熱度儀表板 ---------- */
function gaugeColor(score){
  if (score >= 70) return 'var(--sev-high)';
  if (score >= 40) return 'var(--sev-medium)';
  return 'var(--sev-low)';
}
function gaugeLevel(score){
  if (score >= 70) return '高風險';
  if (score >= 40) return '中風險';
  return '低風險';
}

function renderGaugeSvg(score){
  const cx = 80, cy = 78, r = 62;
  const needleAngle = Math.PI - (score/100) * Math.PI;
  const nxF = cx + (r-10) * Math.cos(needleAngle);
  const nyF = cy - (r-10) * Math.sin(needleAngle);
  const color = gaugeColor(score);
  return `<svg width="160" height="92" viewBox="0 0 160 92">
    <path d="M 18 78 A 62 62 0 0 1 142 78" fill="none" stroke="var(--panel-alt)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 18 78 A 62 62 0 0 1 142 78" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"
      stroke-dasharray="${Math.PI*62}" stroke-dashoffset="${Math.PI*62*(1-score/100)}"/>
    <circle cx="${cx}" cy="${cy}" r="5" fill="${color}"/>
    <line x1="${cx}" y1="${cy}" x2="${nxF}" y2="${nyF}" stroke="${color}" stroke-width="3" stroke-linecap="round"/>
  </svg>`;
}

function renderRiskGauge(risk){
  if (!risk) return emptyNote();
  const score = risk.total ?? 0;
  const breakdown = risk.breakdown || [];
  const bars = breakdown.map(b => `
    <div class="risk-bar-row">
      <div class="risk-bar-label">${escapeHtml(b.label)}</div>
      <div class="risk-bar-track"><div class="risk-bar-fill" style="width:${b.score}%;background:${gaugeColor(b.score)}"></div></div>
      <div class="risk-bar-val">${b.score}/100</div>
    </div>`).join('');
  return `
    <div class="gauge-wrap">
      ${renderGaugeSvg(score)}
      <div class="gauge-score" style="color:${gaugeColor(score)}">${score}<span style="font-size:14px;color:var(--text-dim);">/100</span></div>
      <div class="gauge-level" style="color:${gaugeColor(score)}">${gaugeLevel(score)}</div>
    </div>
    <div class="risk-bars">${bars}</div>`;
}

/* ---------- Panel 6: 資安知識板 ---------- */
function renderDailyLearning(item){
  if (!item) return emptyNote();
  return `<div class="learning-card">
    <div class="learning-top">
      <div class="learning-icon">${item.icon || '🎓'}</div>
      <div class="learning-title">${escapeHtml(item.title || '')}</div>
    </div>
    <div class="learning-desc">${escapeHtml(item.description || '')}</div>
    <div class="learning-bottom">
      <span class="learning-time">閱讀時間：約${escapeHtml(item.reading_time || '3')}分鐘</span>
      ${item.url ? `<a class="learning-btn" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">開始學習</a>` : `<span class="learning-btn" style="opacity:.6;cursor:default;">開始學習</span>`}
    </div>
  </div>`;
}

const grid = document.getElementById('dashboardGrid');

grid.innerHTML =
  panelShell('①', '📰', '今日資安頭條 (Top 5)', null, renderHeadlines(DATA.headlines)) +
  panelShell('②', '🌍', '全球重大事件', null,
    `<div id="globalEventsBody"></div>`,
    `<div class="tab-row">
      <button class="tab-btn active" data-days="1">今天</button>
      <button class="tab-btn" data-days="7">本週</button>
      <button class="tab-btn" data-days="30">本月</button>
    </div>`) +
  panelShell('③', '🎯', '今日漏洞雷達 (CVE)', null, renderCveRadar(DATA.cve_radar)) +
  panelShell('④', '🏢', 'AI企業影響分析', null, renderVendorImpact(DATA.vendor_impact)) +
  panelShell('⑤', '📊', 'AI風險熱度儀表板', null, renderRiskGauge(DATA.risk_score)) +
  panelShell('⑥', '🎓', '資安知識板', null, renderDailyLearning(DATA.daily_learning));

setupGlobalEventsPanel(DATA.global_events);
</script>
